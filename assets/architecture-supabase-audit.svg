<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6EFE4"/>
      <stop offset="1" stop-color="#E7F1E9"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="260" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F5F7F2"/>
    </linearGradient>
    <linearGradient id="aws" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE7B3"/>
      <stop offset="1" stop-color="#FFD070"/>
    </linearGradient>
    <linearGradient id="data" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D9F3E2"/>
      <stop offset="1" stop-color="#BFEACB"/>
    </linearGradient>
    <linearGradient id="observe" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#DDEEFF"/>
      <stop offset="1" stop-color="#C7DCF9"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="400" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#4B4237" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#55493D"/>
    </marker>
    <style>
      .title { font: 700 40px Georgia, 'Times New Roman', serif; fill: #2F2923; }
      .subtitle { font: 500 18px Arial, sans-serif; fill: #5E564F; }
      .section { font: 700 22px Arial, sans-serif; fill: #2F2923; letter-spacing: 0.04em; }
      .card-title { font: 700 24px Arial, sans-serif; fill: #2D2A27; }
      .card-text { font: 500 17px Arial, sans-serif; fill: #4F4A45; }
      .small { font: 600 14px Arial, sans-serif; fill: #5A544D; }
      .label { font: 700 15px Arial, sans-serif; fill: #3F372F; }
      .flow { stroke: #55493D; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="36" fill="url(#bg)"/>

  <text x="90" y="90" class="title">Event-Driven Observability Platform</text>
  <text x="90" y="126" class="subtitle">Fluxo atual com Supabase, KMS, Secrets Manager e trilha de auditoria CloudTrail</text>

  <rect x="70" y="165" width="1460" height="735" rx="30" fill="#FFFFFF" fill-opacity="0.45" stroke="#D9CCBA"/>

  <text x="110" y="215" class="section">INGESTAO E PROCESSAMENTO</text>
  <text x="1080" y="215" class="section">SEGURANCA E AUDITORIA</text>

  <g filter="url(#shadow)">
    <rect x="110" y="260" width="230" height="130" rx="24" fill="url(#card)" stroke="#BDA88F"/>
    <rect x="128" y="280" width="58" height="34" rx="10" fill="#F0C77A"/>
    <text x="205" y="305" class="card-title">Client / API Caller</text>
    <text x="130" y="342" class="card-text">POST /events</text>
    <text x="130" y="368" class="small">order_id, amount, currency</text>
    <text x="130" y="390" class="small">SSN plaintext only at ingress</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="405" y="250" width="255" height="150" rx="24" fill="url(#aws)" stroke="#C79A41"/>
    <text x="433" y="295" class="card-title">API Gateway + Cognito</text>
    <text x="433" y="326" class="card-text">JWT protected endpoint</text>
    <text x="433" y="352" class="small">Access logs to CloudWatch</text>
    <text x="433" y="376" class="small">Correlation ID preserved</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="230" width="310" height="190" rx="26" fill="url(#aws)" stroke="#C79A41"/>
    <text x="758" y="275" class="card-title">Ingestion Lambda</text>
    <text x="758" y="306" class="card-text">Validate event contract</text>
    <text x="758" y="332" class="card-text">Encrypt SSN with AWS KMS</text>
    <text x="758" y="358" class="card-text">Read Supabase key from Secrets Manager</text>
    <text x="758" y="384" class="card-text">Persist masked + ciphertext in Supabase</text>
    <text x="758" y="410" class="small">Publishes only sanitized event to SQS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="745" y="500" width="280" height="145" rx="24" fill="url(#aws)" stroke="#C79A41"/>
    <text x="775" y="545" class="card-title">Processor Lambda</text>
    <text x="775" y="575" class="card-text">Consumes from SQS</text>
    <text x="775" y="601" class="card-text">Checks Supabase reference</text>
    <text x="775" y="627" class="card-text">Writes order record to DynamoDB</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="520" width="225" height="120" rx="22" fill="url(#aws)" stroke="#C79A41"/>
    <text x="447" y="565" class="card-title">SQS Queue + DLQ</text>
    <text x="447" y="594" class="card-text">Async decoupling</text>
    <text x="447" y="618" class="small">Retries + partial batch failure</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="250" width="240" height="135" rx="22" fill="url(#data)" stroke="#6AA57A"/>
    <text x="1096" y="295" class="card-title">Supabase REST</text>
    <text x="1096" y="325" class="card-text">public.orders</text>
    <text x="1096" y="351" class="small">customer_id bigint</text>
    <text x="1096" y="373" class="small">ssn_masked, ssn_encrypted</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="455" width="240" height="145" rx="22" fill="url(#data)" stroke="#6AA57A"/>
    <text x="1096" y="500" class="card-title">DynamoDB Orders</text>
    <text x="1096" y="530" class="card-text">Processed order metadata</text>
    <text x="1096" y="556" class="small">No SSN plaintext</text>
    <text x="1096" y="578" class="small">No Supabase secret stored</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="635" width="240" height="145" rx="22" fill="url(#data)" stroke="#6AA57A"/>
    <text x="1096" y="680" class="card-title">DynamoDB Idempotency</text>
    <text x="1096" y="710" class="card-text">Duplicate suppression</text>
    <text x="1096" y="736" class="small">eventId TTL record</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1295" y="255" width="185" height="110" rx="22" fill="url(#aws)" stroke="#C79A41"/>
    <text x="1322" y="300" class="card-title">Secrets Manager</text>
    <text x="1322" y="328" class="card-text">dev/orders/supabase</text>
    <text x="1322" y="351" class="small">service role key</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1295" y="395" width="185" height="110" rx="22" fill="url(#aws)" stroke="#C79A41"/>
    <text x="1322" y="440" class="card-title">AWS KMS</text>
    <text x="1322" y="468" class="card-text">Encrypt SSN fields</text>
    <text x="1322" y="491" class="small">CMK + alias</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1295" y="545" width="200" height="160" rx="22" fill="url(#observe)" stroke="#6E8FB8"/>
    <text x="1322" y="590" class="card-title">CloudTrail Audit</text>
    <text x="1322" y="620" class="card-text">GetSecretValue</text>
    <text x="1322" y="646" class="card-text">PutSecretValue</text>
    <text x="1322" y="672" class="card-text">RotateSecret / SSM reads</text>
    <text x="1322" y="696" class="small">S3 + CloudWatch Logs + Alarm</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="735" width="530" height="125" rx="22" fill="url(#observe)" stroke="#6E8FB8"/>
    <text x="208" y="780" class="card-title">CloudWatch Observability</text>
    <text x="208" y="810" class="card-text">Lambda logs, API Gateway logs, custom metrics, alarms, dashboards</text>
    <text x="208" y="836" class="small">No SSN plaintext and no service-role key in logs</text>
  </g>

  <path d="M340 325H405" class="flow"/>
  <path d="M660 325H730" class="flow"/>
  <path d="M885 420V500" class="flow"/>
  <path d="M730 575H645" class="flow" marker-end="url(#arrow)"/>
  <path d="M1025 575H1070" class="flow"/>
  <path d="M1025 330H1070" class="flow"/>
  <path d="M1310 315H1295" class="flow" marker-end="url(#arrow)"/>
  <path d="M1310 450H1295" class="flow" marker-end="url(#arrow)"/>
  <path d="M1310 625H1295" class="flow dashed" marker-end="url(#arrow)"/>
  <path d="M530 520V400" class="flow"/>
  <path d="M885 645H1070" class="flow"/>
  <path d="M885 645V780H710" class="flow"/>
  <path d="M885 230V180H1388V255" class="flow dashed"/>

  <text x="552" y="460" class="label">sanitized event</text>
  <text x="1042" y="315" class="label">masked + ciphertext</text>
  <text x="1038" y="562" class="label">business record</text>
  <text x="1328" y="526" class="label">audited access</text>
  <text x="872" y="468" class="label">SQS trigger</text>
  <text x="786" y="197" class="label">runtime secret reads</text>
  <text x="430" y="720" class="label">metrics + logs</text>

  <rect x="88" y="905" width="1425" height="36" rx="18" fill="#2F2923" fill-opacity="0.08" stroke="#CBBFB2"/>
  <text x="110" y="928" class="small">Security boundary: plaintext SSN exists only at request ingress, is encrypted immediately, and never appears in SQS, DynamoDB, DLQ, or application logs.</text>
</svg>
