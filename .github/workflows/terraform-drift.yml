name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev-drift
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  TF_DIR: infra/envs/dev
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_STATE_BUCKET: edop-tfstate-265311921862-us-east-2
  TF_STATE_KEY: terraform/envs/dev/terraform.tfstate
  TF_LOCK_TABLE: event-driven-observability-platform-terraform-locks
  TF_STATE_KMS_KEY_ARN: arn:aws:kms:us-east-2:265311921862:key/ef6993f2-3676-4e2e-b336-ef57979f269a
  AWS_ROLE_ARN_PLAN: arn:aws:iam::265311921862:role/event-driven-observability-platform-github-actions-plan

jobs:
  drift-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build Lambda artifacts
        run: npm run build

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN_PLAN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-terraform-drift

      - name: Terraform init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true" \
            -backend-config="kms_key_id=${TF_STATE_KMS_KEY_ARN}"

      - name: Terraform validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Detect drift
        id: drift
        working-directory: ${{ env.TF_DIR }}
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan
          exit_code=$?
          set -e

          if [ "$exit_code" -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

          if [ "$exit_code" -eq 2 ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render drift plan
        if: steps.drift.outputs.drift_detected == 'true'
        working-directory: ${{ env.TF_DIR }}
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload drift artifact
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-dev-drift-plan
          path: infra/envs/dev/tfplan.txt
          if-no-files-found: error

      - name: Fail when drift is detected
        if: steps.drift.outputs.drift_detected == 'true'
        run: |
          echo "Terraform drift detected for infra/envs/dev"
          exit 1
